services:
  backend:
    image: ghcr.io/sajjadsaharkhan/llmeter/backend:main
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/llmeter.db
    volumes:
      - ./data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/sajjadsaharkhan/llmeter/frontend:main
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    restart: always
